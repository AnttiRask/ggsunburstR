url: https://anttirask.github.io/ggsunburstR/

template:
  bootstrap: 5

reference:
  - title: "Data preparation"
    desc: "Parse hierarchical data and compute coordinates"
    contents:
      - sunburst_data
      - drilldown

  - title: "Plot functions"
    desc: "Create sunburst, icicle, donut, and tree plots"
    contents:
      - sunburst
      - icicle
      - donut
      - ggtree

  - title: "ggplot2 geom"
    desc: "Idiomatic ggplot2 layer for sunburst/icicle plots"
    contents:
      - geom_sunburst

  - title: "Themes"
    desc: "Custom themes for sunburst plots"
    contents:
      - theme_sunburst

  - title: "Multi-scale fill"
    desc: "Per-depth fill colour scales"
    contents:
      - sunburst_multifill
      - icicle_multifill

  - title: "Annotation layers"
    desc: "Add annotations to existing plots"
    contents:
      - highlight_nodes
      - bars
      - tile

  - title: "Utilities"
    desc: "Tree inspection"
    contents:
      - nw_print

  - title: "S3 methods"
    desc: "Methods for sunburst_data objects"
    contents:
      - "$.sunburst_data"
      - print.sunburst_data
      - as.data.frame.sunburst_data
      - plot.sunburst_data
